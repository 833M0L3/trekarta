name: Build APK + Publish Maps

on:
  push:
  workflow_dispatch:
    inputs:
      regions:
        description: 'Geofabrik regions (comma-separated)'
        required: false
        default: 'asia/nepal'
      maxzoom:
        description: 'Tile max zoom (mapcreator-like higher detail, 7-12 recommended)'
        required: false
        default: '10'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ============================================================
  # Build APK
  # ============================================================
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/' | tr -d '[:space:]')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | head -1 | grep -o '[0-9]*')
          COMMIT_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "apk_name=trekarta-v${VERSION_NAME}-${COMMIT_SHORT}.apk" >> $GITHUB_OUTPUT

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Fix broken zh_CN resource directory
        run: |
          if [ -d "app/src/main/res/values-zh_CN" ]; then
            mv app/src/main/res/values-zh_CN app/src/main/res/values-zh-rCN
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Xmx4096m"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Trekarta ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.commit }})"
          body: |
            Version: ${{ steps.version.outputs.version_name }}
            Build: ${{ steps.version.outputs.version_code }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            
            Custom Trekarta build with GitHub Pages map hosting.
          files: app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Generate Maps + Publish
  # ============================================================
  publish-maps:
    name: Generate + Publish Maps
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            wget git sqlite3 osmium-tool osmctools python3-pip \
            --no-install-recommends
          pip3 install mercantile osmium shapely psutil setproctitle tqdm psycopg2-binary

      - name: Clone mapcreator
        run: git clone --depth=1 https://github.com/andreynovikov/mapcreator.git /tmp/mapcreator

      - name: Patch mapcreator configuration for CI paths
        run: |
          sed -i "s|^SOURCE_PBF = .*|SOURCE_PBF = '/tmp/gis-data/source.osm.pbf'|" /tmp/mapcreator/configuration.py
          sed -i "s|^MAP_TARGET_PATH = .*|MAP_TARGET_PATH = '/tmp/maps-output/maps'|" /tmp/mapcreator/configuration.py
          sed -i "s|^LOGGING_PATH = .*|LOGGING_PATH = '/tmp'|" /tmp/mapcreator/configuration.py
          sed -i "s|^DATA_PATH = .*|DATA_PATH = '/tmp/gis-data'|" /tmp/mapcreator/configuration.py
          sed -i "s|^FILTERS_PATH = .*|FILTERS_PATH = '/tmp/mapcreator/filters'|" /tmp/mapcreator/configuration.py

      - name: Create directories
        run: |
          mkdir -p /tmp/gis-data
          mkdir -p /tmp/maps-output/maps
          mkdir -p /tmp/maps-output/hillshades

      - name: Download OSM data
        run: |
          REGIONS="${{ github.event.inputs.regions || 'asia/nepal' }}"
          IFS=',' read -ra REGION_LIST <<< "$REGIONS"
          for REGION in "${REGION_LIST[@]}"; do
            REGION=$(echo "$REGION" | xargs)
            FILENAME=$(basename "$REGION")
            echo "Downloading $REGION"
            wget -q --show-progress \
              "https://download.geofabrik.de/${REGION}-latest.osm.pbf" \
              -O "/tmp/gis-data/${FILENAME}-latest.osm.pbf"
          done

          PBFS=(/tmp/gis-data/*-latest.osm.pbf)
          if [ ${#PBFS[@]} -gt 1 ]; then
            osmium merge "${PBFS[@]}" -o /tmp/gis-data/source.osm.pbf --overwrite
          else
            cp "${PBFS[0]}" "/tmp/gis-data/source.osm.pbf"
          fi

      - name: Generate Trekarta native map tiles
        run: |
          python3 << 'EOF'
          import os
          import re
          import glob
          import shutil
          import struct
          import sqlite3
          import subprocess
          import mercantile

          source_pbf = '/tmp/gis-data/source.osm.pbf'
          map_target = '/tmp/maps-output/maps'
          os.makedirs(map_target, exist_ok=True)

          # Generate basemap with native Trekarta encoder.
          subprocess.run([
            'python3', '/tmp/mapcreator/mapwrite.py',
            '-l', 'INFO', '-f', '-p', map_target,
            '-1', '-1'
          ], check=True)

          # Determine z7 area tiles from source OSM bbox.
          info = subprocess.check_output(['osmium', 'fileinfo', source_pbf], text=True)
          m = re.search(r'Box:\s*\(([-0-9.]+),([-0-9.]+),([-0-9.]+),([-0-9.]+)\)', info)
          if not m:
            raise RuntimeError('Failed to read source bbox from osmium fileinfo output')

          west, south, east, north = map(float, m.groups())
          z7_tiles = {(t.x, t.y) for t in mercantile.tiles(west, south, east, north, [7])}
          if not z7_tiles:
            raise RuntimeError('No z7 tiles found for source bbox')

          # Generate native tiles for each z7 area.
          for x, y in sorted(z7_tiles):
            subprocess.run([
              'python3', '/tmp/mapcreator/mapwrite.py',
              '-l', 'INFO', '-f', '-p', map_target,
              str(x), str(y)
            ], check=True)

          # mapwrite outputs under maps/7/<x>/<x>-<y>.mtiles, move to maps/<x>/<x>-<y>.mtiles
          for src_path in glob.glob(f'{map_target}/7/*/*.mtiles'):
            x_dir = os.path.basename(os.path.dirname(src_path))
            dst_dir = f'{map_target}/{x_dir}'
            os.makedirs(dst_dir, exist_ok=True)
            shutil.move(src_path, f'{dst_dir}/{os.path.basename(src_path)}')

          if os.path.isdir(f'{map_target}/7'):
            shutil.rmtree(f'{map_target}/7')

          # Cleanup intermediate files generated by mapwrite.
          for pattern in ('*.log', '*.osm.pbf', '*.o5m'):
            for junk in glob.glob(f'{map_target}/**/{pattern}', recursive=True):
              try:
                os.remove(junk)
              except OSError:
                pass

          # Java reads short date (2 bytes) + unsigned int size (4 bytes) per entry.
          date_short = int(os.path.getmtime(source_pbf) // 86400)
          tile_map = {}
          for tile_path in glob.glob(f'{map_target}/*/*.mtiles'):
            name = os.path.basename(tile_path)
            m = re.match(r'^(\d+)-(\d+)\.mtiles$', name)
            if not m:
              continue
            x = int(m.group(1))
            y = int(m.group(2))
            tile_map[(x, y)] = os.path.getsize(tile_path)
          
          # Index format: short date (2 bytes) + unsigned int size (4 bytes) = 6 bytes per entry
          index_path = f"{map_target}/index"
          with open(index_path, 'wb') as f:
              for x in range(128):
                  for y in range(128):
                      size = tile_map.get((x, y), 0)
                      f.write(struct.pack('>hI', date_short if size > 0 else 0, size))
              # Basemap entry: append once after all map entries
              basemap_path = 'app/src/main/assets/databases/basemap.mtiles'
              basemap_size = os.path.getsize(basemap_path) if os.path.exists(basemap_path) else 0
              f.write(struct.pack('>hI', date_short if basemap_size > 0 else 0, basemap_size))
          EOF

      - name: Create blank hillshade index
        run: |
          python3 << 'EOF'
          import struct, os
          os.makedirs('/tmp/maps-output/hillshades', exist_ok=True)
          with open('/tmp/maps-output/hillshades/index', 'wb') as f:
              for _ in range(128 * 128):
                  f.write(struct.pack('>bI', 0, 0))
          EOF

      - name: Prepare GitHub Pages
        run: |
          mkdir -p /tmp/gh-pages/maps
          mkdir -p /tmp/gh-pages/hillshades
          cp /tmp/maps-output/maps/index /tmp/gh-pages/maps/index
          cd /tmp/maps-output/maps
          find . -mindepth 2 -maxdepth 2 -name "*.mtiles" -exec cp --parents {} /tmp/gh-pages/maps/ \;
          cp -r /tmp/maps-output/hillshades/* /tmp/gh-pages/hillshades/
          cp /tmp/maps-output/maps/basemap.mtiles /tmp/gh-pages/maps/basemap.mtiles
          
          TILE_COUNT=$(find /tmp/gh-pages/maps -name "*.mtiles" | wc -l)
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          MAX_ZOOM="${{ github.event.inputs.maxzoom || '10' }}"
          
          cat > /tmp/gh-pages/index.html << HTML
          <!DOCTYPE html>
          <html>
          <head><title>Trekarta Maps</title></head>
          <body>
            <h2>Trekarta Map Server</h2>
            <p>Area files: ${TILE_COUNT}</p>
            <p>Zoom range: 7..${MAX_ZOOM}</p>
            <p>Last Build: ${BUILD_DATE}</p>
          </body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: automated tile update ${{ github.sha }}"
