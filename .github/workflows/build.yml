name: Build APK + Publish Maps

on:
  push:
  workflow_dispatch:
    inputs:
      regions:
        description: 'Geofabrik regions (comma-separated, e.g. asia/nepal)'
        required: false
        default: 'asia/nepal'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ============================================================
  # JOB 1: Build the APK from YOUR fork (with Index.java patched
  # to point to 833m0l3.github.io)
  # ============================================================
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Fix broken zh_CN resource directory
        run: |
          if [ -d "app/src/main/res/values-zh_CN" ]; then
            mv app/src/main/res/values-zh_CN app/src/main/res/values-zh-rCN
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Xmx4096m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trekarta-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ============================================================
  # JOB 2: Generate Nepal map tiles and publish to GitHub Pages
  # Only runs on master push or manual trigger
  # ============================================================
  publish-maps:
    name: Generate + Publish Maps to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y osmium-tool osmctools sqlite3 python3-pip --no-install-recommends
          pip3 install osmium mercantile shapely tqdm protobuf

      - name: Clone mapcreator
        run: git clone --depth=1 https://github.com/andreynovikov/mapcreator.git /tmp/mapcreator

      - name: Create working directories
        run: |
          mkdir -p /tmp/gis-data
          mkdir -p /tmp/maps-output/maps
          mkdir -p /tmp/maps-output/hillshades

      - name: Download OSM data from Geofabrik
        run: |
          REGIONS="${{ github.event.inputs.regions || 'asia/nepal' }}"
          IFS=',' read -ra REGION_LIST <<< "$REGIONS"
          for REGION in "${REGION_LIST[@]}"; do
            REGION=$(echo "$REGION" | xargs)
            FILENAME=$(basename "$REGION")
            echo "Downloading $REGION..."
            wget -q --show-progress \
              "https://download.geofabrik.de/${REGION}-latest.osm.pbf" \
              -O "/tmp/gis-data/${FILENAME}-latest.osm.pbf"
          done
          PBFS=(/tmp/gis-data/*-latest.osm.pbf)
          if [ ${#PBFS[@]} -gt 1 ]; then
            osmium merge "${PBFS[@]}" -o /tmp/gis-data/source.osm.pbf --overwrite
          else
            cp "${PBFS[0]}" /tmp/gis-data/source.osm.pbf
          fi
          ls -lh /tmp/gis-data/source.osm.pbf

      - name: Find tiles covering region
        run: |
          python3 << 'EOF'
          import mercantile, osmium, json, os

          class BboxHandler(osmium.SimpleHandler):
              def __init__(self):
                  super().__init__()
                  self.min_lon, self.max_lon = 180, -180
                  self.min_lat, self.max_lat = 90, -90
              def node(self, n):
                  self.min_lon = min(self.min_lon, n.location.lon)
                  self.max_lon = max(self.max_lon, n.location.lon)
                  self.min_lat = min(self.min_lat, n.location.lat)
                  self.max_lat = max(self.max_lat, n.location.lat)

          h = BboxHandler()
          h.apply_file('/tmp/gis-data/source.osm.pbf', locations=False)
          print(f"BBox: {h.min_lon:.4f},{h.min_lat:.4f},{h.max_lon:.4f},{h.max_lat:.4f}")

          tiles = list(mercantile.tiles(h.min_lon, h.min_lat, h.max_lon, h.max_lat, zooms=7))
          tile_list = [f"{t.x}-{t.y}" for t in tiles]
          print(f"Tiles ({len(tiles)}): {tile_list}")

          with open('/tmp/tiles.json', 'w') as f:
              json.dump(tile_list, f)
          EOF

      - name: Generate map tiles
        run: |
          python3 << 'EOF'
          import json, subprocess, sys, os

          with open('/tmp/tiles.json') as f:
              tiles = json.load(f)

          map_target = '/tmp/maps-output/maps'
          data_path = '/tmp/gis-data'
          mapcreator = '/tmp/mapcreator'

          failed = []
          for tile in tiles:
              x, y = map(int, tile.split('-'))
              os.makedirs(f"{map_target}/{x}", exist_ok=True)
              print(f"\nGenerating tile {x}-{y}...")
              result = subprocess.run(
                  [sys.executable, f"{mapcreator}/mapwrite.py",
                   '--from-file', '--log', 'INFO',
                   '--data-path', data_path, str(x), str(y)],
                  timeout=1800
              )
              if result.returncode != 0:
                  print(f"WARNING: tile {x}-{y} failed")
                  failed.append(tile)
              else:
                  src = f"{data_path}/{x}-{y}.mtiles"
                  dst = f"{map_target}/{x}/{x}-{y}.mtiles"
                  if os.path.exists(src):
                      os.rename(src, dst)
                      print(f"  OK: {os.path.getsize(dst)/1024:.1f} KB")

          print(f"\nDone. Failed: {failed or 'none'}")
          EOF

      - name: Generate binary index
        run: |
          python3 << 'EOF'
          import os, sqlite3, struct

          map_target = '/tmp/maps-output/maps'

          def mapinfo(x, y):
              path = f"{map_target}/basemap.mtiles" if x == -1 else f"{map_target}/{x}/{x}-{y}.mtiles"
              if not os.path.exists(path) or os.path.getsize(path) == 0:
                  return 0, 0
              try:
                  with sqlite3.connect(path) as db:
                      row = db.execute("SELECT value FROM metadata WHERE name='timestamp'").fetchone()
                      return os.path.getsize(path), int(row[0]) if row else 0
              except:
                  return os.path.getsize(path), 0

          with open(f"{map_target}/index", 'wb') as f:
              count = 0
              for x in range(128):
                  for y in range(128):
                      size, date = mapinfo(x, y)
                      f.write(struct.pack('>hI', date, size))
                      if size > 0: count += 1
              size, date = mapinfo(-1, -1)
              f.write(struct.pack('>hI', date, size))
          print(f"Index written: {count} non-empty tiles")
          EOF

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p /tmp/gh-pages/maps
          mkdir -p /tmp/gh-pages/hillshades

          # Copy map tiles preserving directory structure
          cp -r /tmp/maps-output/maps/* /tmp/gh-pages/maps/ 2>/dev/null || true
          cp -r /tmp/maps-output/hillshades/* /tmp/gh-pages/hillshades/ 2>/dev/null || true

          # Create a simple index.html so Pages doesn't show a blank site
          cat > /tmp/gh-pages/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head><title>Trekarta Map Server</title></head>
          <body>
          <h2>Trekarta Map Server</h2>
          <p>This GitHub Pages site serves map tiles for the Trekarta app.</p>
          <p>Map files are served from <code>/maps/</code> and <code>/hillshades/</code></p>
          <p>Last updated: <script>document.write(new Date().toISOString())</script></p>
          </body>
          </html>
          HTML

          echo "=== Pages content ==="
          find /tmp/gh-pages -type f | sort | while read f; do
            echo "  $(du -h $f | cut -f1) $f"
          done

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: update Nepal maps ${{ github.sha }}"
