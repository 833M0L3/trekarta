name: Build APK + Publish Maps

on:
  push:
  workflow_dispatch:
    inputs:
      regions:
        description: 'Geofabrik regions (comma-separated, e.g. asia/nepal)'
        required: false
        default: 'asia/nepal'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ============================================================
  # JOB 1: Build APK + publish to GitHub Releases
  # ============================================================
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from build.gradle
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/' | tr -d '[:space:]')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | head -1 | grep -o '[0-9]*')
          COMMIT_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "apk_name=trekarta-v${VERSION_NAME}-${COMMIT_SHORT}.apk" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Fix broken zh_CN resource directory
        run: |
          if [ -d "app/src/main/res/values-zh_CN" ]; then
            mv app/src/main/res/values-zh_CN app/src/main/res/values-zh-rCN
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Xmx4096m"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Trekarta ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.commit }})"
          body: |
            **Version:** ${{ steps.version.outputs.version_name }}
            **Build:** ${{ steps.version.outputs.version_code }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            > Debug build — points to GitHub Pages map server at https://833m0l3.github.io/trekarta/
          files: app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 2: Generate Nepal maps using tilemaker (no DB needed)
  # + publish to GitHub Pages
  # Only runs on master push or manual trigger
  # ============================================================
  publish-maps:
    name: Generate + Publish Maps
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tilemaker + dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            tilemaker \
            sqlite3 \
            python3-pip \
            wget \
            osmium-tool \
            --no-install-recommends
          pip3 install mercantile
          tilemaker --version

      - name: Get tilemaker config files
        run: |
          TILEMAKER_VERSION=$(tilemaker --version 2>&1 | grep -o '[0-9]*\.[0-9]*\.[0-9]*' | head -1)
          echo "Tilemaker version: $TILEMAKER_VERSION"
          git clone --depth=1 https://github.com/systemed/tilemaker.git /tmp/tilemaker-src

      - name: Create directories
        run: |
          mkdir -p /tmp/gis-data
          mkdir -p /tmp/maps-output/maps
          mkdir -p /tmp/maps-output/hillshades

      - name: Download OSM data
        run: |
          REGIONS="${{ github.event.inputs.regions || 'asia/nepal' }}"
          IFS=',' read -ra REGION_LIST <<< "$REGIONS"
          for REGION in "${REGION_LIST[@]}"; do
            REGION=$(echo "$REGION" | xargs)
            FILENAME=$(basename "$REGION")
            echo "Downloading $REGION..."
            wget -q --show-progress \
              "https://download.geofabrik.de/${REGION}-latest.osm.pbf" \
              -O "/tmp/gis-data/${FILENAME}-latest.osm.pbf"
          done

          PBFS=(/tmp/gis-data/*-latest.osm.pbf)
          if [ ${#PBFS[@]} -gt 1 ]; then
            osmium merge "${PBFS[@]}" -o /tmp/gis-data/source.osm.pbf --overwrite
          else
            cp "${PBFS[0]}" /tmp/gis-data/source.osm.pbf
          fi
          ls -lh /tmp/gis-data/source.osm.pbf

      - name: Generate mbtiles with tilemaker
        run: |
          tilemaker \
            --input /tmp/gis-data/source.osm.pbf \
            --output /tmp/maps-output/nepal.mbtiles \
            --config /tmp/tilemaker-src/resources/config-openmaptiles.json \
            --process /tmp/tilemaker-src/resources/process-openmaptiles.lua \
            --store /tmp/tilemaker-store \
            --verbose
          ls -lh /tmp/maps-output/nepal.mbtiles

      - name: Extract tiles into per-tile mtiles files + write index
        run: |
          python3 << 'EOF'
          import sqlite3, os, struct, time

          mbtiles_path = '/tmp/maps-output/nepal.mbtiles'
          map_target = '/tmp/maps-output/maps'
          os.makedirs(map_target, exist_ok=True)

          src = sqlite3.connect(mbtiles_path)

          tiles = src.execute(
              "SELECT tile_column, tile_row, tile_data FROM tiles WHERE zoom_level=7"
          ).fetchall()
          print(f"Found {len(tiles)} zoom-7 tiles")

          now = int(time.time())
          tile_map = {}

          for (x, tms_y, data) in tiles:
              # mbtiles TMS y is flipped vs XYZ
              y = (2**7 - 1) - tms_y
              tile_dir = f"{map_target}/{x}"
              os.makedirs(tile_dir, exist_ok=True)
              tile_path = f"{tile_dir}/{x}-{y}.mtiles"

              dst = sqlite3.connect(tile_path)
              dst.execute("""
                  CREATE TABLE IF NOT EXISTS tiles (
                      zoom_level INTEGER,
                      tile_column INTEGER,
                      tile_row INTEGER,
                      tile_data BLOB
                  )
              """)
              dst.execute("""
                  CREATE TABLE IF NOT EXISTS metadata (
                      name TEXT,
                      value TEXT
                  )
              """)
              dst.execute("INSERT OR REPLACE INTO metadata VALUES ('timestamp', ?)", (str(now),))
              dst.execute("INSERT INTO tiles VALUES (7, ?, ?, ?)", (x, tms_y, data))
              dst.commit()
              dst.close()

              size = os.path.getsize(tile_path)
              tile_map[(x, y)] = size
              print(f"  {x}-{y}.mtiles  ({size/1024:.1f} KB)")

          src.close()
          print(f"\nTotal: {len(tile_map)} tiles written")

          # Binary index: 128x128 cells * 6 bytes each + 6 bytes for basemap
          index_path = f"{map_target}/index"
          with open(index_path, 'wb') as f:
              for x in range(128):
                  for y in range(128):
                      size = tile_map.get((x, y), 0)
                      date = now if size > 0 else 0
                      f.write(struct.pack('>hI', date, size))
              # basemap entry (empty)
              f.write(struct.pack('>hI', 0, 0))

          print(f"Index written: {len(tile_map)} non-empty tiles, {os.path.getsize(index_path)} bytes")
          EOF

      - name: Create blank hillshade index
        run: |
          python3 << 'EOF'
          import struct, os
          os.makedirs('/tmp/maps-output/hillshades', exist_ok=True)
          with open('/tmp/maps-output/hillshades/index', 'wb') as f:
              for _ in range(128 * 128):
                  f.write(struct.pack('>bI', 0, 0))
          print("Blank hillshade index written")
          EOF

      - name: List generated files
        run: |
          echo "=== Maps ==="
          find /tmp/maps-output/maps -type f | sort | while read f; do
            echo "  $(du -h $f | cut -f1)  $f"
          done
          echo ""
          echo "Index size: $(du -h /tmp/maps-output/maps/index | cut -f1)"
          echo "Total tiles: $(find /tmp/maps-output/maps -name '*.mtiles' | wc -l)"

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p /tmp/gh-pages/maps
          mkdir -p /tmp/gh-pages/hillshades

          cp -r /tmp/maps-output/maps/* /tmp/gh-pages/maps/
          cp -r /tmp/maps-output/hillshades/* /tmp/gh-pages/hillshades/

          TILE_COUNT=$(find /tmp/gh-pages/maps -name "*.mtiles" | wc -l)
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT_SHORT=$(echo ${{ github.sha }} | cut -c1-7)

          cat > /tmp/gh-pages/index.html << HTML
          <!DOCTYPE html>
          <html>
          <head>
            <title>Trekarta Map Server — Nepal</title>
            <style>
              body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #333; }
              code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
              table { border-collapse: collapse; width: 100%; margin: 16px 0; }
              td { padding: 6px 12px; border-bottom: 1px solid #eee; }
              td:first-child { font-weight: bold; width: 140px; }
            </style>
          </head>
          <body>
            <h2>🗺 Trekarta Map Server</h2>
            <p>Serving Nepal map tiles for the custom Trekarta build.</p>
            <table>
              <tr><td>Tiles available</td><td>${TILE_COUNT}</td></tr>
              <tr><td>Region</td><td>Nepal (asia/nepal)</td></tr>
              <tr><td>Last updated</td><td>${BUILD_DATE}</td></tr>
              <tr><td>Commit</td><td>${COMMIT_SHORT}</td></tr>
            </table>
            <h3>Endpoints</h3>
            <p><code>https://833m0l3.github.io/trekarta/maps/{x}/{x}-{y}.mtiles</code></p>
            <p><code>https://833m0l3.github.io/trekarta/maps/index</code></p>
            <p><code>https://833m0l3.github.io/trekarta/hillshades/index</code></p>
          </body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: Nepal maps ${{ github.sha }}"
